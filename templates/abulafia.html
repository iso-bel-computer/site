{% extends "base.html" %}

{% block extra_css %}

{% endblock %}

{% block extra_js %}
<script type="module" src="{{ url_for('static', filename='scripts/abulafia/main.js') }}"></script>
{% endblock %}


{% block content %}
<nav id="sidebar">
</nav>
<div id="contentWrapper">
    <div id='searchArea' class='topLevelUi'>
        <input id='companySearch'>
        <div class='checkboxWrapper'>

        </div>
        <div id='searchResults'></div>
    </div>
    <div id='companyDisplay' class='topLevelUi'></div>
    <div id='officerDisplay' class='topLevelUi'></div>

</div>



{% endblock %}

{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/abulafia.css') }}">
{% endblock %}

{% block extra_js %}
<script type="module" src="{{ url_for('static', filename='scripts/abulafia/main.js') }}"></script>
{% endblock %}


{% block content %}
<nav id="sidebar">
</nav>
<div id="contentWrapper">
    <div id='searchArea' class='topLevelUi'>
        <input id='companySearch'>
        <div class='checkboxWrapper'>
            <label for="option1">Show inactive?</label>
            <input type="checkbox" id="showOnlyActiveCompanies" name="option1">
        </div>
        <div id='searchResults'></div>
    </div>
    <div id='companyDisplay' class='topLevelUi'>
        <h1 id='cName'></h1>
        <span id='cStatus'></span><br>
        <span id='cNumber'></span>
        <div id='cDateEst'></div>
        <div id='cDateDissolved'></div>
        <div id='cAddress'></div>
        <div class='flex'>
            <div class='flexColumn'>
                <span id='cActiveOfficerLabel'></span>
                <div id='cActiveOfficers' class='officerResults'></div>
            </div>
            <div class='flexColumn'>
                <span id='cPreviousOfficerLabel'></span>
                <div id='cPreviousOfficers' class='officerResults'></div>
            </div>
        </div>
        <div id='cPwsc'></div>
    </div>
</div>



{% endblock %}

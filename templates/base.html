<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}ISO | BEL{% endblock %}</title>
        <link rel="stylesheet" href="{{url_for('static', filename='base.css')}}">
        {% block extra_css %}{% endblock %}
        <style>
        header {
              background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('{{ url_for("static", filename="resources/images/core/headerBG.png") }}');

    background-position: center;
        }
        </style>
    </head>
    <body>
        <header>
            <div class='flex' style='align-items: end'>

                <div class='sociallinks'>
                    <a href="&#x6d;ailto&#58;izzy&#x40;iso-bel&#46;computer">izzy&#x40;iso-bel&#46;computer</a></div>

                <a href='/' style='display: flex'>
                    <img src="{{ url_for('static', filename='resources/images/core/ISOBEL_LOGO.svg') }}"
                        style="width: 100px"
                        alt='ISO_BEL'></a>

                <input class='headerRouteDisplay' value='&nbsp{{ headerRouteDisplay }}'</input>

            </div>

        </header>
        <main>
            {% block content %}
            {% endblock %}
        </main>
    </body>

</html>

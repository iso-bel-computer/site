<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}ISO | BEL{% endblock %}</title>
        <link rel="stylesheet" href="{{url_for('static', filename='base.css')}}">
        {% block extra_css %}{% endblock %}
        <style>
        header {
            background-image: url('{{ url_for("static", filename="resources/images/core/headerBG.png") }}');
        }
        </style>
    </head>
    <body>
        <header>
            <div class='flex' style='align-items: end'>
                <a href='/'>
                <img src="{{ url_for('static', filename='resources/images/core/ISOBEL_LOGO.svg') }}"
                    style="width: 100px"
                    alt='ISO_BEL'>
                </a>
                <span class='headerRouteDisplay'>&nbsp{{ headerRouteDisplay }}</span>
            </div>
            <div class='sociallinks'>
                <a href='/static/rss.xml'>rss</a>
                <a href="&#x6d;ailto&#58;izzy&#x40;iso-bel&#46;computer">izzy&#x40;iso-bel&#46;computer</a>
            </div>
        </header>
        <main>
            {% block content %}
            {% endblock %}
        </main>
    </body>

</html>

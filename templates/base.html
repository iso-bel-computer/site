<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}ISO | BEL{% endblock %}</title>
        <link rel="stylesheet" href="{{url_for('static', filename='css/base.css')}}">
        <script src="{{ url_for('static', filename='scripts/base.js') }}"></script>
        {% block extra_css %}{% endblock %}

        {% block extra_js %}{% endblock %}
        <style>
        header {
              background:   linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                            url('{{ url_for("static", filename="resources/images/core/headerBG.png") }}');
                            background-position: center;
        }
        </style>
    </head>
    <body>
        <header>
            <div class='flex' style='align-items: end'>

                <div class='sociallinks'>
                    <a href="&#x6d;ailto&#58;izzy&#x40;iso-bel&#46;computer">izzy&#x40;iso-bel&#46;computer</a></div>

                <a href='/' style='display: flex'>
                    <img src="{{ url_for('static', filename='resources/images/core/ISOBEL_LOGO.svg') }}"
                        style="width: 100px"
                        alt='ISO_BEL'></a>
                <div id='routeWrapper'>
                    <form id='headerRouteForm' action="/go" method="POST">
                        <input list='pages'
                                class='headerRouteDisplay'
                                name='headerRouteInput'
                                onfocus="this.value=''"
                                value='~{{ headerRouteDisplay }}'
                                autocomplete='off'>
                        </input>
                        <datalist id="pages">
                        {% for url in siteMap %}
                            <option value='~{{ url }}'>
                        {% endfor %}
                        </datalist>
                    </form>
                </div>

            </div>

        </header>
        <main>
            {% block content %}
            {% endblock %}
        </main>
    </body>

</html>

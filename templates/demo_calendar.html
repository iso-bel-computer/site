<!doctype html>
<html class="no-js" lang="">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Untitled</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="apple-touch-icon" href="/apple-touch-icon.png">
        <!-- Place favicon.ico in the root directory -->

    </head>
    <body>

        <h3>PermaCalendar</h3>
        <div style='display: flex'>
            <table id='calendar' class='noselect'>
            </table>
            <div id='eventDisplay'></div>
        </div>

        <script type='module'>
        const eventDisplay = document.getElementById('eventDisplay')
        const response = await fetch('https://calendar.permacomputing.net/calendar.events.json');
        const events = await response.json();
         console.log(events)

        const eventsByDate = {}
        events.forEach(event => {
             const date = new Date(event.start_date)
             const dateNoTime = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`
             if (!eventsByDate[dateNoTime]) {eventsByDate[dateNoTime] = []}
             eventsByDate[dateNoTime].push(event)
         })
        const now = new Date()



        function mainCalendar() {
            const table = document.getElementById('calendar')
            const STATE = {
                'monthArray': [],
                'displayDate': now,
                'firstOfMonth': new Date(now.getFullYear(), now.getMonth(), 1),
                'displayRandomly': false,
            }

            function constructMonthArray() {

                // ok so the aim here is to get an array with each cell we need.
                // inc event details for days, and blank cells for before the start and after the end of each month
                const monthArray = []

                function getDaysInMonth() {
                    return new Date(STATE.displayDate.getFullYear(), STATE.displayDate.getMonth() + 1, 0).getDate();
                }

                // this gets the number of blank cells we need before the 1st of the month
                function getOffset() {
                    let firstOfMonth = new Date(STATE.displayDate.getFullYear(), STATE.displayDate.getMonth(), 1);
                    return (firstOfMonth.getDay() + 6) % 7
                }

                for (let i = 0; i < getOffset(); i++) {
                    monthArray.push('blankCell')
                }


                // this adds the actual days in the month
                for (let i = 1; i < (getDaysInMonth() + 1); i++) {
                    const d = new Date(STATE.displayDate.getFullYear(), STATE.displayDate.getMonth(), i)
                    const key = `${STATE.displayDate.getFullYear()}-${String(STATE.displayDate.getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`
                    console.log(key)

                    monthArray.push({
                        date: d,
                        events: eventsByDate[key] || {}
                    })
                    if (i === 1) {STATE.firstOfMonth = d}
                }

                // this adds the blank cells after the month
                let lastOfMonth = new Date(STATE.displayDate.getFullYear(), STATE.displayDate.getMonth(), getDaysInMonth())
                let trailingDays = (7 - ((lastOfMonth.getDay() + 6) % 7) - 1) % 7

                for (let day = 0; day < trailingDays; day++) {
                    monthArray.push(`blankCell`)
                }


                STATE.monthArray = monthArray
            }


            function displayEvent(event) {
                console.log(event)

                eventDisplay.innerHTML = `
                    <b>${event.text}</b>
                    ${'<br>' + event?.description + "<br>" || ""}
                    <a href=${event?.location?.url || ""}>${event?.location?.text || ""}</a>
                    <br>
                    ${event.start_date}

                    `
            }

            function buildTableDOM() {
                    const fragment = document.createDocumentFragment()
                    let row = document.createElement('tr')
                    let i = 1
                    STATE.monthArray.forEach(day => {

                        const cell = document.createElement('td')
                        const div = document.createElement('div')
                        div.classList.add('cellContent')

                        if (day?.date) {
                            const date = new Date(day.date)
                            cell.dataset.date = date.toISOString()
                            if (date.getDate() === now.getDate() && date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) {
                                div.innerHTML += '<img src="https://london.permacomputing.net/posts/files/pcm-flower.png">'
                                cell.classList.add('todayCell')
                            } else {
                                div.innerHTML += `<div class='dateNumber'>${day.date.getDate()}</div>`

                            }
                            /// is it the weekend ?
                            if (date.getDay() === 0 || date.getDay() === 6) {
                                cell.classList.add('weekendCell')
                            }

                            // is it in the past?
                            if (date.getTime() < now.getTime()) {

                                cell.classList.add('pastCell')
                            }

                            if (day.events.length > 0) {
                                day.events.forEach(event => {
                                    const eventDiv = document.createElement('div')
                                    let eventTitle = event.text
                                    const eventTrimLength = 28
                                    // trim long titles
                                    if (eventTitle.length > eventTrimLength) {eventTitle = eventTitle.substring(0,eventTrimLength) + ' [...]'}
                                    eventDiv.innerHTML += `<div>${eventTitle}</div>`
                                    eventDiv.addEventListener('click', () => {displayEvent(event)})
                                    eventDiv.classList.add('eventListing')
                                    div.appendChild(eventDiv)

                                })

                            }
                            cell.appendChild(div)

                        } else {
                            cell.innerText = '~'
                            cell.classList.add('blankCell')
                        }



                        row.appendChild(cell)
                        if (i % 7 === 0) {
                            fragment.appendChild(row)
                            row = document.createElement('tr')
                        }

                        cell.dataset.defaultText = cell.innerText


                        i++

                    })

                    if (row.children.length > 0) {
                        fragment.appendChild(row)
                    }

                    const monthCell = table.querySelector('#month')
                    const yearCell = table.querySelector('#year')
                    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
                    monthCell.innerText = months[STATE.firstOfMonth.getMonth()]
                    yearCell.innerText = String(STATE.firstOfMonth.getFullYear())



                    table.appendChild(fragment)
                }


                function addMonthButtons() {
                    const forwardButton = table.querySelector('#monthForwards')
                    const resetButton = table.querySelector('#month')
                    const backwardButton = table.querySelector('#monthBackwards')
                    const dayOfWeekIndicator = table.querySelector('#dayofweekindicator')

                    forwardButton.addEventListener('click', function() {
                        STATE.displayDate = new Date(STATE.displayDate.getFullYear(), STATE.displayDate.getMonth() + 1, 1)
                        refreshUI()
                    })

                    resetButton.addEventListener('click', function() {
                        STATE.displayDate = new Date()
                        refreshUI()
                    })

                    backwardButton.addEventListener('click', function() {
                        STATE.displayDate = new Date(STATE.displayDate.getFullYear(), STATE.displayDate.getMonth() - 1, 1)
                        refreshUI()
                    })




                }

                function refreshUI() {
                    table.innerHTML = `
                            <tr>
                                <th id='year'></th>
                                <th></th>
                                <th></th>
                                <th></th>
                                <th id='monthBackwards' class='button'>←</th>
                                <th id='month' class='button'></th>
                                <th id='monthForwards' class='button'>→</th>
                            </tr>

                    `
                    constructMonthArray()
                    buildTableDOM()
                    addMonthButtons()
                }

                refreshUI()
         }
         mainCalendar()






        </script>
    <style>

     table svg {
         max-width: 25px;
         max-height: 25px;
     }
    th#subscribe th#randomise {
        display: flex;
        justify-content:right;
        align-items: center;
    }
    table {

        border-collapse: collapse;
        border: 1px solid black;
        /* font-family: Ubuntu,"Trebuchet MS","Droid Sans","Liberation Sans",sans-serif */

     }
    td, th {
        font-size: 7pt;
        text-align: right;
        vertical-align: top;
        padding: 3px;
     }

     td {

        border: 1px dotted #22222211;
     }

     td:hover {
         border: 1px solid green

     }

     .button:hover {

        background-color: rgba(58,126,93,0.5);
     }

     th {

        background-color: rgb(58,126,93);
        color: white;
     }

     .cellContent {
        width: 85px;
        height: 30px;
        overflow: scroll;
         display: flex;
         justify-content: space-between;
     }

     .cellContent img {
         max-width: 18px;
         height: 18px;
         filter: brightness(70%);
         margin-left: 3px;
         margin-top: 3px;
     }
     .dateNumber {
        color: #22222275;
     }



     th.active {
         background-color: rgb(230,230,230);
         color: black
     }



     td.eventText {
        background-color: rgb(250,250,250) !important;
        color: rgb(27,27,27) !important;
     }
     td.eventTextBlank {
        background-color: rgb(27,27,27) !important;
        color: white !important;
     }


     td.todayCell {
         border: 1px solid rgb(58,126,93);
         background-color:  #00000000 !important;
     }

     td.weekendCell {
         background-color:  rgba(58,126,93,0.05);

     }

     td.pastCell {
         background-color:  #00000010;
         opacity: 0.8

     }
     .blankCell {
         background-color: #00000030;

     }
     .eventListing {

         margin-left: 7px;
         cursor: pointer;
     }
     .eventListing:hover {

         color: #9138c9
     }

     .pastEvents {
         opacity: 0.8;
         text-decoration: line-through;
         filter: saturate(50%)
     }

    .noselect {
    -webkit-touch-callout: none; /* iOS Safari */
        -webkit-user-select: none; /* Safari */
        -khtml-user-select: none; /* Konqueror HTML */
        -moz-user-select: none; /* Old versions of Firefox */
            -ms-user-select: none; /* Internet Explorer/Edge */
                user-select: none; /* Non-prefixed version, currently
                                    supported by Chrome, Edge, Opera and Firefox */
    }

     #eventDisplay {
         margin-left: 10px;
         border: 1px dotted black;
         padding: 10px;
         max-width: 20vw;
         min-width: 20vw;
         min-height: 10vh;
         max-height: 20vh;
         overflow: scroll;
     }



    @media (max-width: 768px) {

        td, th {
            height: 50px;
            font-size: 0.3em;
            padding: 0px;
            padding-right: 3px;
            padding-top: 0px;
            min-width: 13vw;

        }

        table {
            width: 100%
        }

    }

     @media (min-width: 768px) {

     }

    </style>


        </script>


    </body>

<!doctype html>
<html class="no-js" lang="">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Untitled</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="apple-touch-icon" href="/apple-touch-icon.png">
        <!-- Place favicon.ico in the root directory -->

    </head>
    <body>
        <h3>PermaCalendar</h3>
        <div style='display: flex'>
            <table id='calendar' >
            </table>
            <div id='eventDisplay'></div>
        </div>

        <script src="{{ url_for('static', filename='scripts/calendar.js') }}"></script>
    <style>

     table svg {
         max-width: 25px;
         max-height: 25px;
     }
    th#subscribe th#randomise {
        display: flex;
        justify-content:right;
        align-items: center;
    }
    table {

        border-collapse: collapse;
        border: 1px solid black;
        /* font-family: Ubuntu,"Trebuchet MS","Droid Sans","Liberation Sans",sans-serif */

     }
    td, th {
        font-size: 7pt;
        text-align: right;
        vertical-align: top;
        padding: 3px;
     }

     td {

        border: 1px dotted #22222211;
     }

     td:hover {
         border: 1px solid green

     }

     .button:hover {

        background-color: rgba(58,126,93,0.5);
     }

     th {

        background-color: rgb(58,126,93);
        color: white;
     }

     .cellContent {
        width: 85px;
        height: 30px;
        overflow: scroll;
         display: flex;
         justify-content: space-between;
     }

     .cellContent img {
         max-width: 18px;
         height: 18px;
         filter: brightness(70%);
         margin-left: 3px;
         margin-top: 3px;
     }
     .dateNumber {
        color: #22222275;
     }



     th.active {
         background-color: rgb(230,230,230);
         color: black
     }



     td.eventText {
        background-color: rgb(250,250,250) !important;
        color: rgb(27,27,27) !important;
     }
     td.eventTextBlank {
        background-color: rgb(27,27,27) !important;
        color: white !important;
     }


     td.todayCell {
         border: 1px solid rgb(58,126,93);
         background-color:  #00000000 !important;
     }

     td.weekendCell {
         background-color:  rgba(58,126,93,0.05);

     }

     td.pastCell {
         background-color:  #00000010;
         opacity: 0.8

     }
     .blankCell {
         background-color: #00000030;

     }
     .eventListing {

         margin-left: 7px;
         cursor: pointer;
     }
     .eventListing:hover {

         color: #9138c9
     }

     .pastEvents {
         opacity: 0.8;
         text-decoration: line-through;
         filter: saturate(50%)
     }

    .noselect {
    -webkit-touch-callout: none; /* iOS Safari */
        -webkit-user-select: none; /* Safari */
        -khtml-user-select: none; /* Konqueror HTML */
        -moz-user-select: none; /* Old versions of Firefox */
            -ms-user-select: none; /* Internet Explorer/Edge */
                user-select: none; /* Non-prefixed version, currently
                                    supported by Chrome, Edge, Opera and Firefox */
    }

     #eventDisplay {
         margin-left: 10px;
         border: 1px dotted black;
         padding: 10px;
         max-width: 20vw;
         min-width: 20vw;
         min-height: 10vh;
         max-height: 20vh;
         overflow: scroll;
     }



    @media (max-width: 768px) {

        td, th {
            height: 50px;
            font-size: 0.3em;
            padding: 0px;
            padding-right: 3px;
            padding-top: 0px;
            min-width: 13vw;

        }

        table {
            width: 100%
        }

    }

     @media (min-width: 768px) {

     }

    </style>




    </body>
</html>

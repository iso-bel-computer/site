{% extends "base.html" %}

{% block content %}

<h2>Blog</h2>

{% for post in posts %}
<div class='blogpost' id={{ post.id }}>

    <h3>
        {{ post.date }} - {{ post.title }}

    </h3>
    <div class='blogcontent'>
        {% include post.template %}
    </div>
</div>
{% endfor %}
{% endblock %}
